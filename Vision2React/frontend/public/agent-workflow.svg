<svg width="760" height="560" viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text {
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        font-size: 16px;
        fill: #2d1c65;
        font-weight: 600;
      }
      .label {
        font-size: 14px;
        font-weight: 500;
      }
      .node {
        fill: #f6f1ff;
        stroke: #7746ff;
        stroke-width: 2;
        rx: 16;
        ry: 16;
        filter: drop-shadow(0 2px 4px rgba(13, 7, 36, 0.15));
      }
      .terminal {
        fill: #f1e8ff;
        stroke: #7746ff;
        stroke-width: 2;
      }
      .agent {
        fill: #fff;
        stroke: #a48bff;
        stroke-width: 2;
        rx: 16;
        ry: 16;
      }
      .arrow {
        stroke: #7746ff;
        stroke-width: 2.5;
        fill: none;
        marker-end: url(#arrowhead);
      }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7746ff" />
    </marker>
  </defs>

  <!-- title -->
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700">
    Vision2React Agent Workflow
  </text>

  <!-- start -->
  <ellipse class="terminal" cx="380" cy="70" rx="70" ry="28" />
  <text x="380" y="76" text-anchor="middle">__start__</text>

  <!-- section router -->
  <rect class="node" x="270" y="110" width="220" height="70" />
  <text x="380" y="145" text-anchor="middle">section_router</text>
  <text x="380" y="167" text-anchor="middle" class="label">routes detected sections</text>

  <!-- worker agents -->
  <rect class="agent" x="90" y="230" width="190" height="78" />
  <text x="185" y="270" text-anchor="middle">worker_agent_1</text>
  <text x="185" y="291" text-anchor="middle" class="label">component generation</text>

  <rect class="agent" x="285" y="230" width="190" height="78" />
  <text x="380" y="270" text-anchor="middle">worker_agent_2</text>
  <text x="380" y="291" text-anchor="middle" class="label">component generation</text>

  <rect class="agent" x="480" y="230" width="190" height="78" />
  <text x="575" y="270" text-anchor="middle">worker_agent_3</text>
  <text x="575" y="291" text-anchor="middle" class="label">component generation</text>

  <!-- supervisor -->
  <rect class="node" x="270" y="350" width="220" height="80" />
  <text x="380" y="390" text-anchor="middle">supervisor_agent</text>
  <text x="380" y="412" text-anchor="middle" class="label">validation + retry routing</text>

  <!-- aggregator -->
  <rect class="node" x="270" y="460" width="220" height="70" />
  <text x="380" y="495" text-anchor="middle">aggregator_agent</text>
  <text x="380" y="516" text-anchor="middle" class="label">compose Next.js app</text>

  <!-- end -->
  <ellipse class="terminal" cx="380" cy="550" rx="70" ry="28" />
  <text x="380" y="556" text-anchor="middle">__end__</text>

  <!-- arrows -->
  <line class="arrow" x1="380" y1="98" x2="380" y2="110" />
  <line class="arrow" x1="380" y1="180" x2="185" y2="230" />
  <line class="arrow" x1="380" y1="180" x2="380" y2="230" />
  <line class="arrow" x1="380" y1="180" x2="575" y2="230" />
  <line class="arrow" x1="185" y1="308" x2="380" y2="350" />
  <line class="arrow" x1="380" y1="308" x2="380" y2="350" />
  <line class="arrow" x1="575" y1="308" x2="380" y2="350" />
  <line class="arrow" x1="380" y1="430" x2="380" y2="460" />
  <line class="arrow" x1="380" y1="530" x2="380" y2="550" />
</svg>

